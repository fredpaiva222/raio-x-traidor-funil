<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raio-X do Traidor — Processando análise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="styles.css">
<style>
  body { overflow: hidden; }
  .proc-wrap {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 40px 20px;
  }
  .proc-title {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-align: center;
  }
  .status-text {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.82rem;
    color: var(--text-muted);
    text-align: center;
    min-height: 22px;
  }
  .status-text.done { color: var(--green); }
  .data-counter {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    text-align: right;
    width: 280px;
  }
  .scan-element { position: relative; width: 200px; height: 200px; }
  .scan-circle {
    width: 200px; height: 200px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    border: 2px solid rgba(239,35,60,0.3);
    z-index: 1;
  }
  .scan-circle img {
    width:100%; height:100%;
    object-fit: cover;
    filter: blur(2px) brightness(0.65);
  }
  .scan-icon-wrap {
    width:200px; height:200px;
    border-radius:50%;
    border:2px solid rgba(239,35,60,0.3);
    background: rgba(239,35,60,0.05);
    display:flex; align-items:center; justify-content:center;
    color:var(--red); font-size:3.5rem;
  }
  .scan-line-proc {
    position: absolute; left:0; right:0;
    height:2px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    animation: scanLine 1.5s ease-in-out infinite alternate;
    z-index:3;
  }
  .pulse-ring {
    position:absolute; top:50%; left:50%;
    border-radius:50%;
    border: 1.5px solid rgba(239,35,60,0.45);
    animation: pulseRing 2s ease-out infinite;
  }
  .pulse-ring:nth-child(2) { animation-delay: 1s; }
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="global-bg">
  <div class="grad-top"></div>
  <div class="red-orb"></div>
  <div class="grid"></div>
</div>
<div class="stars-layer"></div>
<div class="stars-layer"></div>

<div class="proc-wrap">

  <div class="proc-title">Raio-X do Traidor — Varredura Digital</div>

  <!-- SCAN ELEMENT -->
  <div class="scan-element" id="scanElement">
    <!-- Filled by JS -->
  </div>

  <!-- PROGRESS BAR -->
  <div>
    <div class="progress-narrow">
      <div class="progress-narrow-fill" id="procProgress"></div>
    </div>
    <div class="data-counter mt-8" id="dataCounter">DADOS: 0.000.000</div>
  </div>

  <!-- STATUS TEXT -->
  <div class="status-text" id="statusText">Iniciando varredura...</div>

</div>

<script>
(function(){

  // =================== SETUP SCAN ELEMENT ===================
  var foto = sessionStorage.getItem('foto_base64');
  var scanEl = document.getElementById('scanElement');

  // Pulse rings (behind)
  var r1 = document.createElement('div');
  r1.className = 'pulse-ring';
  r1.style.cssText = 'width:240px;height:240px;margin-left:-120px;margin-top:-120px;';
  var r2 = document.createElement('div');
  r2.className = 'pulse-ring';
  r2.style.cssText = 'width:270px;height:270px;margin-left:-135px;margin-top:-135px;animation-delay:1s;';

  scanEl.appendChild(r1);
  scanEl.appendChild(r2);

  if(foto) {
    var circle = document.createElement('div');
    circle.className = 'scan-circle';
    var img = document.createElement('img');
    img.src = foto;
    img.alt = '';
    var line = document.createElement('div');
    line.className = 'scan-line-proc';
    circle.appendChild(img);
    circle.appendChild(line);
    scanEl.appendChild(circle);
  } else {
    var icon = document.createElement('div');
    icon.className = 'scan-icon-wrap';
    icon.innerHTML = '<iconify-icon icon="lucide:scan-face" width="64"></iconify-icon>';
    var line2 = document.createElement('div');
    line2.className = 'scan-line-proc';
    line2.style.cssText = 'position:absolute;left:0;right:0;';
    scanEl.appendChild(icon);
    scanEl.appendChild(line2);
  }

  // =================== PROGRESS ===================
  var startTime = Date.now();
  var duration = 60000;
  var progressEl = document.getElementById('procProgress');

  function animProgress() {
    var elapsed = Date.now() - startTime;
    var pct = Math.min((elapsed / duration) * 100, 100);
    progressEl.style.width = pct + '%';
    if(pct < 100) requestAnimationFrame(animProgress);
  }
  requestAnimationFrame(animProgress);

  // =================== STATUS TEXTS ===================
  var statuses = [
    { t: 1000,  text: 'Iniciando varredura facial...', done: false },
    { t: 5000,  text: 'Indexando base de dados...', done: false },
    { t: 12000, text: 'Verificando plataformas de relacionamento...', done: false },
    { t: 20000, text: 'Cruzando perfis encontrados...', done: false },
    { t: 30000, text: 'Analisando padrões comportamentais...', done: false },
    { t: 40000, text: 'Calculando similaridade facial...', done: false },
    { t: 50000, text: 'Compilando dossiê...', done: false },
    { t: 58000, text: 'Finalizando relatório...', done: false },
    { t: 60000, text: 'Concluído.', done: true }
  ];

  var statusEl = document.getElementById('statusText');
  statuses.forEach(function(s){
    setTimeout(function(){
      statusEl.textContent = s.text;
      if(s.done) statusEl.className = 'status-text done';
    }, s.t);
  });

  // =================== DATA COUNTER ===================
  var counterEl = document.getElementById('dataCounter');
  function randomCounter() {
    var n = Math.floor(Math.random() * 9000000) + 1000000;
    var s = n.toLocaleString('pt-BR');
    counterEl.textContent = 'DADOS: ' + s;
  }
  var counterInterval = setInterval(randomCounter, 100);

  // =================== REDIRECT ===================
  setTimeout(function(){
    clearInterval(counterInterval);
    window.location.href = 'resultado.html';
  }, duration + 1000);

})();
</script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</body>
</html>
